<style>
:root{--bg:#07090e;--bg2:#0b0f1a;--card:#0f1520;--card2:#0a0d15;--orange:#ff8a00;--gold:#ffb700;--white:#e8e3da;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{font-family:'Barlow Condensed',sans-serif;color:var(--white)}
.topbar{background:var(--bg2);border-bottom:1px solid rgba(255,138,0,.12);padding:12px 20px 10px;position:sticky;top:0;z-index:100}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand-title{font-size:22px;font-weight:800;font-style:italic;letter-spacing:.08em;color:#fff}
.brand-title em{color:var(--orange);font-style:normal}
.brand-sub{font-size:9px;font-weight:700;letter-spacing:.28em;color:rgba(255,138,0,.4);text-transform:uppercase}
.topright{display:flex;align-items:center;gap:10px}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.25);font-weight:600}
.sdot{width:7px;height:7px;border-radius:50%;background:#475569;flex-shrink:0}
.sdot.ok{background:#22c55e;animation:pulse 2s infinite}
.sdot.err{background:#ef4444}
.sdot.saving{background:var(--orange);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pin-btn{font-size:11px;padding:4px 10px;border-radius:3px;background:rgba(255,138,0,.08);border:1px solid rgba(255,138,0,.2);color:rgba(255,138,0,.7);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.admin-badge{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(255,138,0,.15);border:1px solid rgba(255,138,0,.3);color:var(--orange);font-weight:700;cursor:pointer}
.sess-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.sess-row::-webkit-scrollbar{display:none}
.sc{padding:4px 11px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.3);cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;transition:all .15s}
.sc.on{background:rgba(255,138,0,.1);border-color:rgba(255,138,0,.35);color:var(--orange)}
.sc.fw.on{background:rgba(255,60,0,.1);border-color:rgba(255,60,0,.4);color:#ff4400}

.tab.on{color:var(--orange);border-bottom-color:var(--orange)}

<body>

<div class="topbar">
  <div class="brand-row">
    <div>
      <div class="brand-title">MAY <em>MADNESS</em></div>
      <div class="brand-sub">Urban Social Series · Vol. 3</div>
    </div>
    <div class="topright">
      <button class="pin-btn" id="adminBtn" onclick="toggleAdmin()">Admin</button>
      <div class="sync"><div class="sdot" id="sdot"></div><span id="stxt">Loading...</span></div>
    </div>
  </div>
  <div class="sess-row" id="sessRow"></div>
</div>
<div class="tabs" id="tabBar"></div>
<div class="body" id="appBody"></div>

<!-- MODALS -->
<div class="ov" id="pinMo" style="display:none" onclick="if(event.target===this)closePin()">
  <div class="mo"><div class="mt2">Admin PIN</div>
    <input class="pi" id="pinIn" type="password" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')doPin()">
    <div class="mbtns"><button class="mbt s" onclick="closePin()">Cancel</button><button class="mbt p" onclick="doPin()">Unlock</button></div>
  </div>
</div>

<div class="ov" id="resetMo" style="display:none" onclick="if(event.target===this)closeReset()">
  <div class="mo"><div class="mt2">⚠️ Reset Session</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button onclick="doReset('scores')" class="mbt" style="background:rgba(255,138,0,.1);border:1px solid rgba(255,138,0,.25);color:rgba(255,180,50,.9);padding:12px">🔄 Reset Scores — Keep Draw</button>
      <button onclick="doReset('redraw')" class="mbt" style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:rgba(147,197,253,.9);padding:12px">🎲 Redraw — Keep Pairs</button>
      <button onclick="doReset('delete')" class="mbt" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:rgba(252,165,165,.9);padding:12px">🗑️ Delete Session Completely</button>
      <button onclick="closeReset()" class="mbt s" style="padding:12px">Cancel</button>
    </div>
  </div>
</div>

<div class="ov" id="seedMo" style="display:none" onclick="if(event.target===this)closeSeed()">
  <div class="mo" style="max-width:420px"><div class="mt2">🌱 Review Seeds</div>
    <div style="font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:14px">Auto-ranked by season points · Use ↑↓ to reorder · × to remove</div>
    <div id="seedList"></div>
    <div class="mbtns"><button class="mbt s" onclick="closeSeed()">Cancel</button><button class="mbt p" onclick="confirmSeeds()">Confirm & Draw →</button></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// MAY MADNESS v5 — Full Rebuild
// Urban Social Series Vol. 3
// ═══════════════════════════════════════════════════════════════
const API="https://script.google.com/macros/s/AKfycbwq2z85GlIFlDaThwu_MuGTi1ln88gVx1nhOuxjZJrS1c0wwIAAcnFKHaUH167QZ6D8/exec";
const PIN="1234";
const LS="mm_v5";
const SCHED=[
  {num:1,label:"Session 1",date:"Mon May 5",mult:1},{num:2,label:"Session 2",date:"Wed May 7",mult:1},
  {num:3,label:"Session 3",date:"Mon May 12",mult:1},{num:4,label:"Session 4",date:"Wed May 14",mult:1},
  {num:5,label:"Session 5",date:"Mon May 19",mult:1},{num:6,label:"Session 6",date:"Wed May 21",mult:1},
  {num:7,label:"Session 7",date:"Mon May 26",mult:2},{num:8,label:"Session 8",date:"Wed May 28",mult:2}
];
const TABS=["Register","Draw","Groups","Knockouts","Leaderboard","Points"];

// ── FORMAT ENGINE ─────────────────────────────────────────────
// Validated for all 8-16 team counts
// Rules: 3 matches per player (groups of 5: 4 played, drop lowest for standings)
// Always 8 qualify to QF
const FMT={
  8: {g:{A:4,B:4},         drop:[],        po:null},
  9: {g:{A:5,B:4},         drop:["A"],     po:null},
  10:{g:{A:5,B:5},         drop:["A","B"], po:null},
  11:{g:{A:4,B:4,C:3},     drop:[],        po:"C"},
  12:{g:{A:4,B:4,C:4},     drop:[],        po:null},
  13:{g:{A:4,B:4,C:5},     drop:["C"],     po:null},
  14:{g:{A:5,B:5,C:4},     drop:["A","B"], po:null},
  15:{g:{A:4,B:4,C:4,D:3}, drop:[],        po:"D"},
  16:{g:{A:4,B:4,C:4,D:4}, drop:[],        po:null}
};

function getFmt(n){return FMT[n]||FMT[16];}
function gk(f){return Object.keys(f.g);}

function buildGroups(ranked,seeds,fmt){
  const keys=gk(fmt),grps={};
  keys.forEach(k=>{grps[k]=[];});
  const top=seeds.slice(0,keys.length),bot=seeds.slice(keys.length,keys.length*2);
  keys.forEach((k,i)=>{if(top[i])grps[k].push(top[i].label);});
  [...keys].reverse().forEach((k,i)=>{if(bot[i])grps[k].push(bot[i].label);});
  const used=new Set(seeds.map(s=>s.label));
  const rest=shuf(ranked.filter(p=>!used.has(p.label)));
  let ri=0;
  keys.forEach(k=>{const need=fmt.g[k]-grps[k].length;for(let j=0;j<need;j++)if(ri<rest.length)grps[k].push(rest[ri++].label);});
  return grps;
}

function buildMatches(grps,fmt){
  const ms=[];
  gk(fmt).forEach(g=>{
    const t=grps[g];if(!t)return;
    for(let i=0;i<t.length;i++)for(let j=i+1;j<t.length;j++)
      ms.push({id:`${g}${i}${j}`,group:g,home:t[i],away:t[j],hs:"",as:"",done:false,isTB:false});
  });
  return ms;
}

function calcStandings(matches,grps,fmt){
  const keys=fmt?gk(fmt):Object.keys(grps);
  const s={};
  keys.forEach(g=>{
    if(!grps[g])return;s[g]={};
    grps[g].forEach(t=>{s[g][t]={team:t,p:0,w:0,l:0,d:0,pts:0,gf:0,ga:0,all:[]};});
  });
  (matches||[]).forEach(m=>{
    if(!m.done||!s[m.group])return;
    const h=parseInt(m.hs),a=parseInt(m.as),g=m.group;
    if(!s[g]?.[m.home]||!s[g]?.[m.away])return;
    s[g][m.home].p++;s[g][m.away].p++;
    s[g][m.home].gf+=h;s[g][m.home].ga+=a;
    s[g][m.away].gf+=a;s[g][m.away].ga+=h;
    s[g][m.home].all.push({sc:h,co:a,w:h>a,l:h<a,d:h===a});
    s[g][m.away].all.push({sc:a,co:h,w:a>h,l:a<h,d:h===a});
    if(h>a){s[g][m.home].w++;s[g][m.home].pts+=3;s[g][m.away].l++;}
    else if(a>h){s[g][m.away].w++;s[g][m.away].pts+=3;s[g][m.home].l++;}
    else{s[g][m.home].d++;s[g][m.away].d++;s[g][m.home].pts++;s[g][m.away].pts++;}
  });
  const res={};
  keys.forEach(g=>{
    const isDrop=fmt&&fmt.drop.includes(g);
    let rows=Object.values(s[g]||{});
    if(isDrop){
      rows=rows.map(row=>{
        if(row.all.length<4)return row;
        // Drop worst result (sort best to worst by score diff, keep top 3)
        const sorted=[...row.all].sort((a,b)=>(b.sc-b.co)-(a.sc-a.co));
        const b3=sorted.slice(0,3);
        return{...row,p:3,
          w:b3.filter(r=>r.w).length,l:b3.filter(r=>r.l).length,d:b3.filter(r=>r.d).length,
          pts:b3.reduce((s,r)=>s+(r.w?3:r.d?1:0),0),
          gf:b3.reduce((s,r)=>s+r.sc,0),ga:b3.reduce((s,r)=>s+r.co,0)};
      });
    }
    res[g]=rows.sort((a,b)=>{
      if(b.w!==a.w)return b.w-a.w;
      const gA=a.gf-a.ga,gB=b.gf-b.ga;
      if(gB!==gA)return gB-gA;
      const h2=(matches||[]).find(m=>m.done&&m.group===g&&
        ((m.home===a.team&&m.away===b.team)||(m.home===b.team&&m.away===a.team)));
      if(h2){const aW=(h2.home===a.team&&parseInt(h2.hs)>parseInt(h2.as))||
        (h2.away===a.team&&parseInt(h2.as)>parseInt(h2.hs));return aW?-1:1;}
      if(b.gf!==a.gf)return b.gf-a.gf; // most scored
      return 0; // sudden death
    });
  });
  return res;
}

function getQualifiers(st,fmt,n,poOverride){
  const keys=gk(fmt);
  const allR=keys.flatMap(g=>st[g]||[]);
  const seed=(arr)=>[...arr].sort((a,b)=>{
    const ra=allR.find(t=>t.team===a)||{w:0,gf:0,ga:0};
    const rb=allR.find(t=>t.team===b)||{w:0,gf:0,ga:0};
    return rb.w-ra.w||(rb.gf-rb.ga)-(ra.gf-ra.ga)||rb.gf-ra.gf;
  });
  let q=[];
  // 8: all qualify, seeded by results
  if(n===8)return allR.sort((a,b)=>b.w-a.w||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf).slice(0,8).map(t=>t.team);
  // 9,10: top 4 from each group
  if(n===9||n===10){(st["A"]||[]).slice(0,4).forEach(t=>q.push(t.team));(st["B"]||[]).slice(0,4).forEach(t=>q.push(t.team));return seed(q);}
  // 11,15: top 2 from main groups + 1 auto + 1 playoff from group of 3
  if(n===11||n===15){
    const pg=fmt.po;
    keys.filter(g=>g!==pg).forEach(g=>(st[g]||[]).slice(0,2).forEach(t=>q.push(t.team)));
    const pgR=st[pg]||[];
    if(pgR[0])q.push(pgR[0].team);
    const pw=poOverride||(pgR[1]?.team);
    if(pw&&!q.includes(pw))q.push(pw);
    return seed(q.slice(0,8));
  }
  // 12,13: top 2 from each + 2 best 3rd place
  if(n===12||n===13){
    keys.forEach(g=>(st[g]||[]).slice(0,2).forEach(t=>q.push(t.team)));
    const thirds=keys.map(g=>(st[g]||[])[2]).filter(Boolean)
      .sort((a,b)=>b.w-a.w||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
    thirds.slice(0,2).forEach(t=>q.push(t.team));
    return seed(q.slice(0,8));
  }
  // 14: top 3 from groups of 5, top 2 from group of 4
  if(n===14){
    (st["A"]||[]).slice(0,3).forEach(t=>q.push(t.team));
    (st["B"]||[]).slice(0,3).forEach(t=>q.push(t.team));
    (st["C"]||[]).slice(0,2).forEach(t=>q.push(t.team));
    return seed(q.slice(0,8));
  }
  // 16: top 2 from each group with cross-path seeding 1v8,4v5,2v7,3v6
  if(n===16){
    const a=st["A"]||[],b=st["B"]||[],c=st["C"]||[],d=st["D"]||[];
    return [a[0],d[1],c[0],b[1],b[0],c[1],d[0],a[1]].filter(Boolean).map(t=>t?.team).filter(Boolean);
  }
  // fallback
  keys.forEach(g=>(st[g]||[]).slice(0,2).forEach(t=>q.push(t.team)));
  return q.slice(0,8);
}

function mkKO(q){
  // Standard bracket: 1v8, 4v5, 2v7, 3v6
  const m=(id,h,a)=>({id,home:q[h]||null,away:q[a]||null,hs:"",as:"",done:false,isTB:false});
  return{
    qf:[m("qf1",0,7),m("qf2",3,4),m("qf3",1,6),m("qf4",2,5)],
    sf:[{id:"sf1",home:null,away:null,hs:"",as:"",done:false,isTB:false},{id:"sf2",home:null,away:null,hs:"",as:"",done:false,isTB:false}],
    final:{id:"fin",home:null,away:null,hs:"",as:"",done:false,isTB:false},
    winner:null,poOverride:null
  };
}

function advKO(ko){
  const k=JSON.parse(JSON.stringify(ko));
  const w=m=>(!m?.done||!m.home||!m.away)?null:parseInt(m.hs)>parseInt(m.as)?m.home:parseInt(m.as)>parseInt(m.hs)?m.away:null;
  const qw=k.qf.map(w);
  if(qw[0])k.sf[0].home=qw[0];if(qw[1])k.sf[0].away=qw[1];
  if(qw[2])k.sf[1].home=qw[2];if(qw[3])k.sf[1].away=qw[3];
  const sw=k.sf.map(w);
  if(sw[0])k.final.home=sw[0];if(sw[1])k.final.away=sw[1];
  k.winner=w(k.final);
  return k;
}

// ── POINTS ENGINE ─────────────────────────────────────────────
// Tested: champion=24pts, runner-up=16pts, 2x in final week
function mPts(my,opp,isTB){
  const m=parseInt(my),o=parseInt(opp);
  if(isNaN(m)||isNaN(o)||m===o)return 0;
  if(m>o)return 3;           // win
  if(isTB)return 2;          // tiebreak loss
  if(o===6&&m<=1)return 0;   // 6-0 or 6-1 loss
  return 1;                  // competitive loss
}

function fP(sess,label){const pr=(sess.pairs||[]).find(p=>p.label===label);return pr?[pr.p1,pr.p2]:[];}

function calcSessPts(sess){
  const pts={},mult=sess.mult||1;
  (sess.pairs||[]).forEach(pr=>{pts[pr.p1]=0;pts[pr.p2]=0;});
  const aw=(hL,aL,hs,as,isTB)=>{
    if(isNaN(parseInt(hs))||isNaN(parseInt(as)))return;
    fP(sess,hL).forEach(p=>{if(p in pts)pts[p]+=mPts(hs,as,isTB)*mult;});
    fP(sess,aL).forEach(p=>{if(p in pts)pts[p]+=mPts(as,hs,isTB)*mult;});
  };
  // Group match points
  (sess.groupMatches||[]).forEach(m=>{if(m.done)aw(m.home,m.away,m.hs,m.as,m.isTB);});
  // Top of group bonus (+1 per player in winning pair)
  const fmt=sess.fmt||getFmt(sess.teamCount||16);
  if(sess.standings){
    gk(fmt).forEach(g=>{
      const top=sess.standings[g]?.[0];
      if(top)fP(sess,top.team).forEach(p=>{if(p in pts)pts[p]+=1*mult;});
    });
  }
  // KO points
  if(sess.ko){
    [...(sess.ko.qf||[]),...(sess.ko.sf||[])].forEach(m=>{
      if(m?.done&&m.home&&m.away)aw(m.home,m.away,m.hs,m.as,m.isTB);
    });
    const fin=sess.ko.final;
    if(fin?.done&&fin.home&&fin.away){
      aw(fin.home,fin.away,fin.hs,fin.as,fin.isTB);
      // Both finalists get +2
      [fin.home,fin.away].forEach(l=>fP(sess,l).forEach(p=>{if(p in pts)pts[p]+=2*mult;}));
      // Winner gets +3 more
      const champ=parseInt(fin.hs)>parseInt(fin.as)?fin.home:fin.away;
      fP(sess,champ).forEach(p=>{if(p in pts)pts[p]+=3*mult;});
    }
  }
  return pts;
}

function calcStreak(player,sessions,idx){
  let s=0;
  for(let i=idx;i>=0;i--){
    if((sessions[i].pairs||[]).some(p=>p.p1===player||p.p2===player))s++;
    else break;
  }
  const mult=sessions[idx]?.mult||1;
  if(s>=4)return 3*mult;if(s===3)return 2*mult;if(s===2)return mult;return 0;
}

function getSeasonPts(){
  const t={};
  ST.sessions.forEach((sess,idx)=>{
    const sp=calcSessPts(sess);
    Object.entries(sp).forEach(([p,v])=>{t[p]=(t[p]||0)+v;});
    Object.keys(sp).forEach(p=>{t[p]=(t[p]||0)+calcStreak(p,ST.sessions,idx);});
  });
  return t;
}

// ── UTILS ─────────────────────────────────────────────────────
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function extractPairs(text){
  return text.split("\n").map(l=>l.trim()).filter(Boolean).reduce((arr,line)=>{
    const m=line.match(/^(?:\d+[\.\-\)]\s*)?(.+?)\s*[\/\|&+]\s*(.+)$/);
    if(m){const p1=m[1].trim(),p2=m[2].trim();if(p1&&p2)arr.push({p1,p2,label:`${p1} / ${p2}`});}
    return arr;
  },[]);
}

function isBanned(p1,p2){
  const last=ST.sessions[ST.sessions.length-1];
  if(!last?.ko?.winner)return false;
  const wp=(last.pairs||[]).find(p=>p.label===last.ko.winner);
  if(!wp)return false;
  return(wp.p1===p1&&wp.p2===p2)||(wp.p1===p2&&wp.p2===p1);
}

function openSeedModal(ranked){
  window._sr=ranked;
  const seeds=ST.seeds||ranked.slice(0,8);
  const fmt=getFmt(ranked.length);
  const minS=gk(fmt).length;
  const used=new Set(seeds.map(s=>s.label));
  const rest=ranked.filter(p=>!used.has(p.label));
  let h=`<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,138,0,.4);margin-bottom:8px">Seeds (${seeds.length}/8) — need at least ${minS}</div>`;
  seeds.forEach((pr,i)=>{
    h+=`<div class="si"><span class="sr">${i+1}</span><span class="sn">${esc(pr.label)}</span>
      ${i>0?`<button class="sb" onclick="mvSeed(${i},-1)">↑</button>`:""}
      ${i<seeds.length-1?`<button class="sb" onclick="mvSeed(${i},1)">↓</button>`:""}
      <button class="sb" style="border-color:rgba(255,0,0,.2);color:rgba(255,80,80,.5)" onclick="rmSeed(${i})">×</button></div>`;
  });
  if(rest.length>0&&seeds.length<8){
    h+=`<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.18);margin:10px 0 6px">Unseeded</div>`;
    rest.forEach(pr=>{h+=`<div style="display:flex;align-items:center;gap:7px;padding:6px 10px;background:rgba(255,255,255,.02);border-radius:3px;margin-bottom:3px"><span style="flex:1;font-size:12px;font-weight:600;color:rgba(255,255,255,.35)">${esc(pr.label)}</span><button class="sb" style="border-color:rgba(255,138,0,.2);color:rgba(255,138,0,.6)" onclick="addSeed('${esc(pr.label)}')">+ Seed</button></div>`;});
  }
  document.getElementById("seedList").innerHTML=h;
  document.getElementById("seedMo").style.display="flex";
}
function closeSeed(){document.getElementById("seedMo").style.display="none";}
function mvSeed(i,d){const s=ST.seeds||window._sr.slice(0,8);const ni=i+d;if(ni<0||ni>=s.length)return;[s[i],s[ni]]=[s[ni],s[i]];ST.seeds=s;openSeedModal(window._sr);}
function rmSeed(i){const s=ST.seeds||window._sr.slice(0,8);s.splice(i,1);ST.seeds=s;openSeedModal(window._sr);}
function addSeed(label){const s=ST.seeds||window._sr.slice(0,8);if(s.length>=8)return;const pr=window._sr.find(p=>p.label===label);if(pr){s.push(pr);ST.seeds=s;openSeedModal(window._sr);}}

function confirmSeeds(){
  closeSeed();
  const ranked=window._sr,seeds=ST.seeds||ranked.slice(0,8);
  const fmt=getFmt(ranked.length);
  if(seeds.length<gk(fmt).length){alert(`Need at least ${gk(fmt).length} seeds.`);return;}
  const grps=buildGroups(ranked,seeds,fmt);
  const idx=ST.sessions.length;
  const sI=SCHED[idx]||{num:idx+1,label:`Session ${idx+1}`,date:"",mult:1};
  const ns={...sI,id:Date.now(),pairs:ranked,seeds:seeds.map(s=>s.label),groups:grps,
    groupMatches:buildMatches(grps,fmt),fmt,teamCount:ranked.length,standings:null,ko:null,status:"active"};
  ST.sessions.push(ns);ST.activeIdx=idx;
  ST.paste="";ST.parsed=[];ST.seeds=null;ST.tab=1;

}

async function doReset(type){
  closeReset();
  const sess=getSess();if(!sess)return;
  if(type==="delete"){
    if(!confirm("Delete this session completely?"))return;
    ST.sessions=ST.sessions.filter((_,i)=>i!==ST.activeIdx);
    ST.activeIdx=ST.sessions.length>0?ST.sessions.length-1:null;
    saveLocal();try{await apiPost({action:"deleteSession",sessionId:sess.id});}catch(e){}render();
  }else if(type==="scores"){
    if(!confirm("Reset all scores? Draw and pairs will be kept."))return;
    const fmt=sess.fmt||getFmt(sess.teamCount||16);
    updSess({...sess,groupMatches:buildMatches(sess.groups,fmt),standings:null,ko:null,status:"active"});
    undoStack=[];render();
  }else if(type==="redraw"){
    if(!confirm("Redraw groups? Pairs stay, all scores reset."))return;
    ST.seeds=null;
    const sp=getSeasonPts();
    const ranked=[...sess.pairs].sort((a,b)=>((sp[b.p1]||0)+(sp[b.p2]||0))-((sp[a.p1]||0)+(sp[a.p2]||0)));
    window._sr=ranked;openSeedModal(ranked);
  }
}

function uG(id,field,val){
  const sess=getSess();if(!sess)return;
  sess.groupMatches=sess.groupMatches.map(m=>{
    if(m.id!==id)return m;
    const u={...m,[field]:val};
    if(field!=="isTB")u.done=u.hs!==""&&u.as!==""&&!isNaN(parseInt(u.hs))&&!isNaN(parseInt(u.as));

function liveStandings(sess,fmt){
  gk(fmt).forEach(g=>{
    const rows=sess.standings?.[g];if(!rows)return;
    const tb=document.querySelector(`[data-std="${g}"] tbody`);
    if(!tb)return;
    tb.innerHTML=rows.map((row,i)=>{
      const isAdv=fmt.po===g?i===0:i<2;
      return`<tr class="${isAdv?"adv":""}"><td>${esc(row.team)}</td><td>${row.p}</td><td>${row.w}</td><td>${row.l}</td><td>${row.gf-row.ga>0?"+":""}${row.gf-row.ga}</td><td class="pv">${row.pts}</td></tr>`;
    }).join("");
  });
  sess.groupMatches.forEach(m=>{
    const row=document.querySelector(`[data-mid="${m.id}"]`);if(!row)return;
    const dot=row.querySelector(".dd");
    if(m.done&&!dot){const d=document.createElement("div");d.className="dd";row.appendChild(d);}
    else if(!m.done&&dot)dot.remove();
  });
  const allDone=gk(fmt).every(g=>sess.groupMatches.filter(m=>m.group===g).every(m=>m.done));
  const ex=document.querySelector(".gko-btn");
  if(allDone&&!sess.ko&&ST.isAdmin){if(!ex){const b=document.createElement("button");b.className="btn2 gko-btn";b.style.cssText="display:block;margin:12px auto 0";b.textContent="Generate Knockout Bracket →";b.onclick=genKO;document.getElementById("appBody").appendChild(b);}}
  else if(ex)ex.remove();
}

function uKO(stage,id,field,val){
  pushUndo();
  const sess=getSess();if(!sess)return;
  const ko=JSON.parse(JSON.stringify(sess.ko));
  const sd=m=>{if(field!=="isTB")m.done=m.hs!==""&&m.as!==""&&!isNaN(parseInt(m.hs))&&!isNaN(parseInt(m.as))&&parseInt(m.hs)!==parseInt(m.as);};
  if(stage==="qf")ko.qf=ko.qf.map(m=>{if(m.id!==id)return m;const u={...m,[field]:val};sd(u);return u;});
  else if(stage==="sf")ko.sf=ko.sf.map(m=>{if(m.id!==id)return m;const u={...m,[field]:val};sd(u);return u;});
  else{ko.final={...ko.final,[field]:val};sd(ko.final);}
  sess.ko=advKO(ko);updSess(sess);render();
}

function tKTB(stage,id){
  const sess=getSess();if(!sess)return;
  const ko=JSON.parse(JSON.stringify(sess.ko));
  if(stage==="qf")ko.qf=ko.qf.map(m=>m.id===id?{...m,isTB:!m.isTB}:m);
  else if(stage==="sf")ko.sf=ko.sf.map(m=>m.id===id?{...m,isTB:!m.isTB}:m);
  else ko.final={...ko.final,isTB:!ko.final.isTB};
  sess.ko=ko;updSess(sess);render();
}

function genKO(){
  const sess=getSess();if(!sess)return;
  const n=sess.teamCount||Object.values(sess.groups||{}).flat().length;
  const fmt=sess.fmt||getFmt(n);
  const st=sess.standings||calcStandings(sess.groupMatches,sess.groups,fmt);
  const q=getQualifiers(st,fmt,n,sess.ko?.poOverride||null);
  sess.ko=mkKO(q);sess.standings=st;updSess(sess);ST.tab=3;render();
}

async function closeSession(){
  if(!confirm("Close this session? Scores will be locked."))return;
  const sess=getSess();if(!sess)return;
  const u={...sess,status:"closed"};updSess(u);
  try{await apiPost({action:"closeSession",sessionId:sess.id});}catch(e){}render();
}

// ── EDIT GROUPS ───────────────────────────────────────────────
function toggleEG(){ST.editGroups=!ST.editGroups;render();}

function saveGroups(){
  const sess=getSess();if(!sess)return;
  const fmt=sess.fmt||getFmt(sess.teamCount||16);
  const keys=gk(fmt);
  const ng={};keys.forEach(g=>{ng[g]=[];});
  document.querySelectorAll(".gs-sel").forEach(sel=>{
    const team=sel.dataset.team,grp=sel.value;
    if(ng[grp]!==undefined)ng[grp].push(team);
  });
  const bad=keys.find(g=>ng[g].length!==fmt.g[g]);
  if(bad){alert(`Group ${bad} must have exactly ${fmt.g[bad]} teams.`);return;}
  const u={...sess,groups:ng,groupMatches:buildMatches(ng,fmt),standings:null,ko:null};
  ST.editGroups=false;updSess(u);render();
}

// ── NAME EDITING ──────────────────────────────────────────────
function toggleEN(){ST.editNames=!ST.editNames;render();}

function renamePlayer(oldName,newName){
  newName=newName.trim();
  if(!newName||newName===oldName)return;
  const rep=s=>s.split(" / ").map(n=>n===oldName?newName:n).join(" / ");
  ST.sessions=ST.sessions.map(sess=>({...sess,
    pairs:(sess.pairs||[]).map(pr=>{const p1=pr.p1===oldName?newName:pr.p1,p2=pr.p2===oldName?newName:pr.p2;return{...pr,p1,p2,label:`${p1} / ${p2}`};}),
    seeds:(sess.seeds||[]).map(rep),
    groups:Object.fromEntries(Object.entries(sess.groups||{}).map(([g,t])=>[g,t.map(rep)])),
    groupMatches:(sess.groupMatches||[]).map(m=>({...m,home:rep(m.home),away:rep(m.away)}))
  }));
  saveLocal();ST.sessions.forEach(sess=>sched(sess));render();
}

// ── REGISTER HELPERS ──────────────────────────────────────────
function onPaste(val){ST.paste=val;ST.parsed=extractPairs(val);render();}
function rmParsed(i){ST.parsed.splice(i,1);render();}
function editPN(i,field,val){ST.parsed[i][field]=val.trim();ST.parsed[i].label=`${ST.parsed[i].p1} / ${ST.parsed[i].p2}`;}

function canDraw(){
  const n=ST.parsed.length;
  if(!FMT[n])return false;
  const names=ST.parsed.flatMap(p=>[p.p1,p.p2]);
  const c={};names.forEach(n=>{c[n]=(c[n]||0)+1;});
  return!Object.values(c).some(v=>v>1)&&!ST.parsed.some(pr=>isBanned(pr.p1,pr.p2));
}

function openSeedAndDraw(){
  if(!canDraw())return;
  const sp=getSeasonPts();
  const ranked=[...ST.parsed].sort((a,b)=>((sp[b.p1]||0)+(sp[b.p2]||0))-((sp[a.p1]||0)+(sp[a.p2]||0)));
  ST.seeds=null;window._sr=ranked;openSeedModal(ranked);
}

// ── RENDER ────────────────────────────────────────────────────

  });
  if(ST.isAdmin)h+=`<button class="sc ${ST.activeIdx===null&&ST.tab===0?"on":""}" onclick="newSess()">+ New</button>`;
  document.getElementById("sessRow").innerHTML=h;
}

function rTabs(){

}

        h+=`<div class="lbr" style="${!el?"opacity:.4":""}">`;
        h+=`<div class="lbrk ${rc}">${el?(i===0?"1ST":i===1?"2ND":i===2?"3RD":i+1):"—"}</div>`;
        h+=`<div style="flex:1;min-width:0">${nameEl}<div class="lbsc">${sc} session${sc!==1?"s":""}${!el?" · needs "+(2-sc)+" more":""}</div></div>`;
        h+=`<div class="lbm"><div class="lbd">${bd.map((b,si)=>b?`<span class="lbs ${b.mult===2?"fx":""}">S${si+1}:${b.pts}</span>`:"").join("")}</div>${streak>=2?`<div class="lbst">🔥 ${streak} streak</div>`:""}</div>`;
        h+=`<div class="lbp">${pts}</div></div>`;
      });
      h+=`</div>`;
    }
  }

  // ── POINTS REFERENCE ──────────────────────────────────────
  else if(ST.tab===5){
    [
      {t:"Match Points",items:[["Win any match","+3","g"],["Competitive loss (6-2 or closer)","+1",""],["Tiebreak loss","+2",""],["Lost 6-0 or 6-1","0 pts","r"]]},
      {t:"Bonus Points",items:[["Top of group","+1",""],["Reach Final (both teams)","+2",""],["Win the Final","+3","g"]]},
      {t:"Attendance Streak",items:[["2 sessions in a row","+1",""],["3 in a row","+2",""],["4+ in a row","+3 MAX","g"]]},
      {t:"Session Multipliers",items:[["Sessions 1–6","1× normal",""],["Sessions 7–8 Final Week","2× EVERYTHING 🔥","g"]]},
      {t:"Point Verification",items:[["Champion max (1× session)","24 pts","g"],["Champion max (2× session)","48 pts","g"],["Runner-up (1× session)","16 pts",""],["Runner-up (2× session)","32 pts",""]]},
      {t:"Format by Team Count",items:[["8 teams","2×4 · all 8 qualify",""],["9","1×5 + 1×4 · drop lowest",""],["10","2×5 · drop lowest both",""],["11 / 15","3×4 + 1×3 · playoff",""],["12","3×4 · top 2 + 2 best 3rd",""],["13","2×4 + 1×5 · drop lowest",""],["14","2×5 + 1×4 · drop lowest",""],["16","4×4 · top 2 each","g"]]},
      {t:"Tiebreakers",items:[["1st","Wins",""],["2nd","Game difference",""],["3rd","Head to head",""],["4th","Most games scored",""],["5th","Sudden death point (live)","r"]]},
      {t:"Partner Rules",items:[["Last session winners re-pair","NOT ALLOWED","r"],["Min sessions for leaderboard","2 sessions",""],["New players joining mid-season","Always allowed","g"]]},
    ].forEach(sec=>{
      h+=`<div class="pref"><div class="prt">${sec.t}</div><div class="prg">`;
      sec.items.forEach(([l,v,c])=>h+=`<div class="pri"><span class="prl">${l}</span><span class="prv ${c}">${v}</span></div>`);
      h+=`</div></div>`;
    });
  }

  body.innerHTML=h;
}

function n2Desc(n){
  const f=FMT[n];if(!f)return`${n} teams`;
  const parts=Object.entries(f.g).map(([g,s])=>`Group ${g}: ${s} teams`);
  let desc=parts.join(" · ");
  if(f.drop.length)desc+=` · Group${f.drop.length>1?"s":""} ${f.drop.join("&")} play 4, drop lowest`;
  if(f.po)desc+=` · Group ${f.po} has playoff for 2nd qualifier`;
  return desc;
}

// ── NAVIGATION ────────────────────────────────────────────────
function setTab(i){ST.tab=i;render();}
function setSession(i){ST.activeIdx=i;ST.tab=1;render();}
function newSess(){ST.activeIdx=null;ST.tab=0;ST.paste="";ST.parsed=[];ST.seeds=null;render();}

// ── INIT ──────────────────────────────────────────────────────
render();
loadSessions();
</script>
